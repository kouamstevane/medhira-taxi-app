<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medjira Taxi App - Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0d0d14; color: #e0e0e0; overflow: hidden; height: 100vh;
}
.header {
  padding: 10px 20px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-bottom: 1px solid #2a2a4a;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 16px; color: #fff; }
.stats { display: flex; gap: 16px; }
.stat { font-size: 11px; color: #8888aa; }
.stat strong { color: #6c63ff; font-size: 14px; }
.wrap { display: flex; height: calc(100vh - 48px); }
.side {
  width: 340px; min-width: 340px;
  display: flex; flex-direction: column;
  background: #0f0f1a; border-right: 1px solid #2a2a4a;
}
.search { padding: 6px 10px; border-bottom: 1px solid #2a2a4a; }
.search input {
  width: 100%; padding: 5px 8px;
  background: #1a1a2e; border: 1px solid #2a2a4a;
  border-radius: 4px; color: #ccc; font-size: 11px; outline: none;
}
.search input:focus { border-color: #6c63ff; }
.search input::placeholder { color: #555; }
.filters { padding: 6px 10px; border-bottom: 1px solid #2a2a4a; display: flex; gap: 4px; }
.fbtn {
  padding: 4px 10px; border: 1px solid #2a2a4a; border-radius: 4px;
  background: #1a1a2e; color: #999; cursor: pointer; font-size: 11px;
}
.fbtn.on { border-color: #6c63ff; color: #fff; background: #2a2a4e; }
.clist { flex: 1; overflow-y: auto; padding: 6px; }
.ccard {
  padding: 8px 10px; margin-bottom: 3px; border-radius: 5px;
  background: #1a1a2e; border: 1px solid #222; cursor: pointer;
  transition: border-color 0.15s;
}
.ccard:hover { border-color: #6c63ff; }
.ccard.on { border-color: #6c63ff; background: #1e1e3a; }
.ccard .cn { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
.ccard .cm { font-size: 10px; color: #777; margin-top: 2px; }
.ccard .cf {
  font-size: 9px; color: #555; margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.garea { flex: 1; position: relative; overflow: hidden; }
svg { width: 100%; height: 100%; }
.tip {
  position: absolute; padding: 10px 14px;
  background: rgba(15,15,30,0.95); border: 1px solid #6c63ff;
  border-radius: 6px; font-size: 12px; pointer-events: none;
  display: none; max-width: 320px; z-index: 100;
}
.tip b { display: block; margin-bottom: 3px; color: #fff; font-size: 13px; }
.tip small { color: #999; display: block; margin-top: 2px; }
.tip .td { color: #6c63ff; font-size: 11px; margin-top: 3px; }
.tip .tf { color: #666; font-size: 10px; margin-top: 3px; line-height: 1.5; }
.detail {
  display: none; position: absolute; top: 10px; right: 10px;
  width: 420px; max-height: calc(100vh - 70px); overflow-y: auto;
  background: rgba(12,12,24,0.97); border: 1px solid #6c63ff;
  border-radius: 8px; padding: 16px; z-index: 50;
}
.detail h2 { font-size: 14px; color: #6c63ff; margin-bottom: 8px; padding-right: 20px; }
.detail .x { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888; font-size: 18px; }
.detail .x:hover { color: #fff; }
.detail .dm { font-size: 12px; color: #aaa; margin-bottom: 12px; }
.detail .sec {
  font-size: 11px; color: #6c63ff; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 14px;
  padding-bottom: 4px; border-bottom: 1px solid #2a2a4a;
}
.detail .df { font-size: 11px; color: #888; }
.detail .df div {
  margin-bottom: 3px; word-break: break-all;
  padding: 3px 6px; background: #1a1a2e; border-radius: 3px;
}
.detail .df div:hover { background: #222244; }
.detail .badge {
  display: inline-block; padding: 2px 8px; margin: 2px;
  background: #1a1a2e; border: 1px solid #2a2a4a;
  border-radius: 10px; font-size: 10px; color: #aaa;
}
.detail .conn {
  font-size: 11px; color: #888; padding: 3px 0;
}
.detail .conn span { color: #6c63ff; }
.leg {
  position: absolute; bottom: 10px; left: 10px;
  background: rgba(12,12,24,0.92); padding: 10px 12px;
  border-radius: 6px; border: 1px solid #2a2a4a;
  max-height: 300px; overflow-y: auto; max-width: 250px;
}
.leg h3 { font-size: 10px; color: #777; margin-bottom: 5px; text-transform: uppercase; }
.li { display: flex; align-items: center; gap: 6px; font-size: 10px; margin-bottom: 3px; color: #aaa; }
.lc { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <h1>Medjira Taxi App - Knowledge Graph</h1>
  <div class="stats">
    <div class="stat">Files: <strong>421</strong></div>
    <div class="stat">Nodes: <strong>{stats["total_nodes"]:,}</strong></div>
    <div class="stat">Edges: <strong>{stats["total_edges"]:,}</strong></div>
    <div class="stat">Communities: <strong>{stats["meaningful_communities"]}</strong></div>
  </div>
</div>
<div class="wrap">
  <div class="side">
    <div class="search">
      <input type="text" id="search" placeholder="Search communities..." oninput="doSearch(this.value)">
    </div>
    <div class="filters">
      <button class="fbtn on" onclick="filt('all',this)">All</button>
      <button class="fbtn" onclick="filt('app',this)">App (202)</button>
      <button class="fbtn" onclick="filt('droid',this)">Android</button>
    </div>
    <div class="clist" id="clist"></div>
  </div>
  <div class="garea">
    <svg id="g"></svg>
    <div class="tip" id="tip"></div>
    <div class="detail" id="det">
      <span class="x" onclick="closeDet()">&times;</span>
      <h2 id="dt"></h2>
      <div class="dm" id="dm"></div>
      <div id="dinfo"></div>
      <div class="sec">Source Files</div>
      <div class="df" id="df"></div>
    </div>
    <div class="leg">
      <h3>Legend</h3>
      <div style="color:#6c63ff;font-size:10px;margin-bottom:6px">Scroll = zoom | Drag background = pan | Click node = details</div>
      <div id="leg"></div>
    </div>
  </div>
</div>

  tip.style.top = (ev.offsetY - 10) + "px";
  circles.attr("opacity", n => n.id === d.id ? 1 : 0.25);
  edges.attr("stroke", e => (e.source.id === d.id || e.target.id === d.id) ? "#6c63ff" : "#2a2a4a")
    .attr("stroke-width", e => (e.source.id === d.id || e.target.id === d.id) ? 2.5 : 0.5)
    .attr("opacity", e => (e.source.id === d.id || e.target.id === d.id) ? 0.9 : 0.08);
}).on("mouseleave", function() {
  document.getElementById("tip").style.display = "none";
  circles.attr("opacity", 1);
  edges.attr("stroke", "#5588bb")
    .attr("stroke-width", d => 1 + Math.min(d.weight * 0.5, 3))
    .attr("opacity", 0.6);
});

function pick(d) {
  selId = d.id;
  document.querySelectorAll(".ccard").forEach(c => c.classList.toggle("on", c.dataset.id === d.id));
  const card = document.querySelector('.ccard[data-id="' + d.id + '"]');
  if (card) card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  circles.attr("stroke", n => n.id === d.id ? "#6c63ff" : (n.meaningful ? "#fff" : "#333"))
    .attr("stroke-width", n => n.id === d.id ? 3 : (n.meaningful ? 1.5 : 0.5));

  document.getElementById("det").style.display = "block";
  document.getElementById("dt").textContent = d.label;
  document.getElementById("dm").innerHTML =
    d.size + " nodes | Cohesion: " + d.cohesion.toFixed(3) +
    " | <strong>" + (d.files || []).length + " files</strong>";

  // Info section
  var info = document.getElementById("dinfo");
  var typeStr = Object.entries(d.types || {}).map(([k,v]) => '<span class="badge">' + v + ' ' + k + '</span>').join("");
  var connHtml = (d.connected || []).map(c => '<div class="conn"><span>&#8594;</span> ' + c + '</div>').join("");
  info.innerHTML =
    '<div class="sec">Domain</div>' +
    '<div style="font-size:12px;color:#fff;margin-bottom:4px">' + d.domain + '</div>' +
    '<div class="sec">File Types</div>' +
    '<div style="margin-bottom:4px">' + typeStr + '</div>' +
    (connHtml ? '<div class="sec">Connected To</div>' + connHtml : "");

  // Files
  const df = document.getElementById("df");
  df.innerHTML = "";
  (d.files || []).forEach(function(f) {
    const div = document.createElement("div");
    div.textContent = f;
    df.appendChild(div);
  });
}

function closeDet() {
  document.getElementById("det").style.display = "none";
  selId = null;
  circles.attr("stroke", d => d.meaningful ? "#fff" : "#333")
    .attr("stroke-width", d => d.meaningful ? 1.5 : 0.5);
  document.querySelectorAll(".ccard").forEach(c => c.classList.remove("on"));
}

function buildSidebar() {
  const el = document.getElementById("clist");
  el.innerHTML = "";
  gNodes.forEach(function(item) {
    const card = document.createElement("div");
    card.className = "ccard";
    card.dataset.id = item.id;
    card.dataset.m = item.meaningful ? "true" : "false";
    const fc = (item.files || []).length;
    const fS = (item.files || []).slice(0, 2).map(f => f.split("/").slice(-2).join("/")).join(" | ");
    card.innerHTML =
      '<div class="cn"><span class="dot" style="background:' + item.color + '"></span>' +
      item.label + ' <small style="color:#666;font-size:9px">(' + fc + ' files)</small></div>' +
      '<div class="cm">' + item.domain + ' | ' + item.size + ' nodes | ' + item.cohesion.toFixed(3) + '</div>' +
      (fS ? '<div class="cf">' + fS + '</div>' : "");
    card.onclick = function() { pick(item); };
    el.appendChild(card);
  });
}
buildSidebar();

function filt(type, btn) {
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
  document.querySelectorAll(".ccard").forEach(c => {
    const m = c.dataset.m === "true";
    c.style.display = type === "all" ? "block" : (type === "app" ? m : !m);
  });
  const ids = new Set(gNodes.filter(n =>
    type === "all" ? true : (type === "app" ? n.meaningful : !n.meaningful)
  ).map(n => n.id));
  circles.attr("opacity", d => ids.has(d.id) ? 1 : 0.05);
  edges.attr("opacity", d => ids.has(d.source.id) && ids.has(d.target.id) ? 0.6 : 0.01);
}

function doSearch(q) {
  q = q.toLowerCase();
  document.querySelectorAll(".ccard").forEach(c => {
    c.style.display = c.textContent.toLowerCase().includes(q) ? "block" : "none";
  });
}

const legEl = document.getElementById("leg");
gNodes.filter(n => n.meaningful).slice(0, 20).forEach(n => {
  legEl.innerHTML += '<div class="li"><div class="lc" style="background:' + n.color + '"></div>' + n.label + '</div>';
});
legEl.innerHTML += '<div class="li"><div class="lc" style="background:#444"></div>Android WebView Bundles</div>';
</script>
</body>
</html>
