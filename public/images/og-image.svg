<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e6e6e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f29200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e68600;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#f29200" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#f29200" opacity="0.1"/>
  
  <!-- Logo Circle -->
  <circle cx="300" cy="315" r="120" fill="url(#orangeGradient)"/>
  
  <!-- Taxi icon in circle -->
  <g transform="translate(240, 265)">
    <path d="M40 80c-4.4 0-8 3.6-8 8v16c0 4.4 3.6 8 8 8h8.25c0 13.25 10.75 24 24 24s24-10.75 24-24h21c0 13.25 10.75 24 24 24s24-10.75 24-24h8.25c4.4 0 8-3.6 8-8V88c0-4.4-3.6-8-8-8h-8.95L155.2 48h20.8c4.4 0 8-3.6 8-8V32c0-4.4-3.6-8-8-8H24c-4.4 0-8 3.6-8 8v8c0 4.4 3.6 8 8 8h20.8L35.55 80H40z" fill="white" transform="scale(0.8)"/>
  </g>
  
  <!-- Main Text -->
  <text x="480" y="280" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#101010">
    Medjira
  </text>
  
  <!-- Tagline -->
  <text x="480" y="340" font-family="Arial, sans-serif" font-size="40" fill="#666">
    Mobilité et Livraison
  </text>
  
  <text x="480" y="390" font-family="Arial, sans-serif" font-size="40" fill="#666">
    au Cameroun 🇨🇲
  </text>
  
  <!-- Features -->
  <g transform="translate(480, 440)">
    <!-- Taxi -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" fill="#f29200">
      🚗 Taxi rapide
    </text>
    
    <!-- Livraison -->
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="28" fill="#f29200">
      📦 Livraison
    </text>
    
    <!-- Secure -->
    <text x="400" y="0" font-family="Arial, sans-serif" font-size="28" fill="#f29200">
      🔒 Sécurisé
    </text>
  </g>
  
  <!-- Website -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="#999" text-anchor="middle">
    www.medjira.com
  </text>
</svg>





