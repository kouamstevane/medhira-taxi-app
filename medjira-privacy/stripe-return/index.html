<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medjira — Retour Stripe</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #f8f9fa;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px 28px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
        }
        .icon {
            font-size: 56px;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 22px;
            margin: 8px 0 16px;
        }
        p {
            margin: 8px 0;
            color: #444;
        }
        .muted {
            color: #777;
            font-size: 14px;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }
        .badge.success { background: #e6f7ed; color: #1f7a3a; }
        .badge.refresh { background: #fff4e0; color: #8a5a00; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            background: #ff7a00;
            color: #fff;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 999px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="content">
            <div class="icon">✓</div>
            <h1>Retour de Stripe</h1>
            <p>Vérification en cours…</p>
        </div>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var onboarding = params.get('onboarding') || 'success';
            var accountId = params.get('account_id') || '';
            var role = params.get('role') || '';
            var content = document.getElementById('content');

            var isSuccess = onboarding === 'success';
            var icon = isSuccess ? '✅' : '🔄';
            var title = isSuccess
                ? 'Configuration Stripe terminée'
                : 'Lien expiré — à relancer';
            var message = isSuccess
                ? 'Votre compte Stripe a été soumis pour vérification. Tentative d\'ouverture de l\'application Medjira...'
                : 'Le lien d\'onboarding Stripe a expiré. Retournez dans l\'application Medjira et relancez la configuration des paiements.';
            var badgeClass = isSuccess ? 'success' : 'refresh';
            var badgeText = isSuccess ? 'Succès' : 'À relancer';

            content.innerHTML =
                '<div class="icon">' + icon + '</div>' +
                '<h1>' + title + '</h1>' +
                '<div class="badge ' + badgeClass + '">' + badgeText + (role ? ' · ' + role : '') + '</div>' +
                '<p>' + message + '</p>' +
                '<p class="muted" id="fallback">Si l\'app ne s\'ouvre pas, retournez manuellement dans Medjira.</p>';

            if (isSuccess) {
                // Try to open the app
                var deepLinkParams = new URLSearchParams();
                deepLinkParams.set('onboarding', onboarding);
                if (accountId) deepLinkParams.set('account_id', accountId);
                if (role) deepLinkParams.set('role', role);
                var paramStr = deepLinkParams.toString();

                // Detect platform
                var isAndroid = /Android/i.test(navigator.userAgent);
                var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

                var deepLinkUrl;
                if (isAndroid) {
                    deepLinkUrl = 'intent://stripe-return?' + paramStr + '#Intent;scheme=medjira;package=com.medjiraservice.medjiraserviceapp2;end';
                } else if (isIOS) {
                    deepLinkUrl = 'medjira://stripe-return?' + paramStr;
                } else {
                    deepLinkUrl = 'medjira://stripe-return?' + paramStr; // fallback
                }

                try {
                    window.location.href = deepLinkUrl;
                } catch (e) {
                    // Ignore
                }

                // After 3 seconds, show fallback if not opened
                setTimeout(function() {
                    document.getElementById('fallback').innerHTML = 'Retournez dans l\'app Medjira';
                }, 3000);
            }
        })();
    </script>
</body>
</html>
